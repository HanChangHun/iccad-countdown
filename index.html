<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICCAD 2026 Submission Deadline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 1.5rem;
      max-width: 600px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1rem;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      background: linear-gradient(to right, #f7797d, #FBD786, #C6FFDD);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 1.5rem;
    }

    .deadline-info {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 1.5rem;
    }

    .now-info {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 0.3rem;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .unit {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1rem 0;
      width: 72px;
      backdrop-filter: blur(20px);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .unit:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(247, 121, 125, 0.2);
    }

    .unit .number {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(to bottom, #fff, rgba(255, 255, 255, 0.7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .unit .label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 0.4rem;
    }

    .expired {
      font-size: 1.8rem;
      color: #f7797d;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    @media (max-width: 400px) {
      h1 { font-size: 1.8rem; }
      .unit { width: 64px; padding: 0.8rem 0; }
      .unit .number { font-size: 1.6rem; }
      .countdown { gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="badge">Conference Deadline</div>
    <h1>ICCAD 2026</h1>
    <p class="subtitle">Paper Submission Deadline</p>
    <p class="now-info" id="nowInfo"></p>
    <p class="deadline-info">Deadline: 2026. 4. 15. (Wed) 20:59 KST</p>

    <div class="countdown" id="countdown">
      <div class="unit">
        <div class="number" id="days">--</div>
        <div class="label">Days</div>
      </div>
      <div class="unit">
        <div class="number" id="hours">--</div>
        <div class="label">Hours</div>
      </div>
      <div class="unit">
        <div class="number" id="minutes">--</div>
        <div class="label">Min</div>
      </div>
      <div class="unit">
        <div class="number" id="seconds">--</div>
        <div class="label">Sec</div>
      </div>
    </div>
  </div>

  <script>
    const DEADLINE = new Date('2026-04-15T20:59:00+09:00').getTime();

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    const DAYS_KR = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function updateNow() {
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth() + 1;
      const d = now.getDate();
      const day = DAYS_KR[now.getDay()];
      const hh = pad(now.getHours());
      const mm = pad(now.getMinutes());
      document.getElementById('nowInfo').textContent =
        `Now: ${y}. ${m}. ${d}. (${day}) ${hh}:${mm} KST`;
    }

    function update() {
      const now = Date.now();
      const diff = DEADLINE - now;

      if (diff <= 0) {
        document.getElementById('countdown').innerHTML =
          '<p class="expired">Submission Closed!</p>';
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = pad(days);
      document.getElementById('hours').textContent = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);

      requestAnimationFrame(update);
    }

    // Particles
    (function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (6 + Math.random() * 10) + 's';
        p.style.animationDelay = -(Math.random() * 16) + 's';
        p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
        container.appendChild(p);
      }
    })();

    updateNow();
    setInterval(updateNow, 60000);
    update();
  </script>
</body>
</html>
